name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: win11/package-lock.json

      - name: Install dependencies
        working-directory: win11
        run: npm ci

      - name: Lint
        working-directory: win11
        run: npm run lint

      - name: Build
        working-directory: win11
        run: npm run build
